# Prometheus Guardian Node — LLaMA 3 Inference via vLLM
# Architecture Decision #6: LLaMA 3 70B (primary)
# Architecture Decision #7: LLaMA 3 8B (fallback, lower hardware barrier)
#
# Usage:
#   8B only:  docker compose up guardian-8b
#   70B:      Uncomment guardian-70b section, then: docker compose up guardian-70b

# Note: version key deprecated in Docker Compose v2.x but harmless
version: "3.9"

services:
  guardian-8b:
    image: vllm/vllm-openai:latest
    container_name: prometheus-guardian-8b
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models
    environment:
      - MODEL_NAME=meta-llama/Meta-Llama-3-8B-Instruct
      - MAX_MODEL_LEN=8192
      - GPU_MEMORY_UTILIZATION=0.90
    command: >
      --model /models/Meta-Llama-3-8B-Instruct
      --port 8000
      --max-model-len 8192
      --gpu-memory-utilization 0.90
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

